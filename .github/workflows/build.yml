name: Build

on:
  push:
    branches:
      - master
      - repo-cleanup-release
      - "codex/**"
  pull_request:
    branches:
      - master

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore SubscriptionTracker.sln

      - name: Build
        run: dotnet build SubscriptionTracker.sln -c Release --no-restore

      - name: Test
        run: dotnet test SubscriptionTracker.Tests\SubscriptionTracker.Tests.csproj -c Release --no-build
